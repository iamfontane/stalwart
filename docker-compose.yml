services:
  stalwart:
    image: stalwartlabs/stalwart:latest
    container_name: stalwart
    restart: unless-stopped

    environment:
      - STALWART_PATH=/opt/stalwart
      - STALWART_ADMIN_SECRET=${STALWART_ADMIN_SECRET}

    ports:
      - "25:25"       # SMTP (inbound from internet)
      - "465:465"     # SMTPS (implicit TLS)
      - "587:587"     # SMTP submission (STARTTLS)
      - "143:143"     # IMAP
      - "993:993"     # IMAPS (implicit TLS)
      - "110:110"     # POP3
      - "995:995"     # POP3S (implicit TLS)
      - "4190:4190"   # ManageSieve
      - "443:443"     # HTTPS admin UI + ACME tls-alpn-01 challenge
      - "80:80"       # HTTP — ACME http-01 fallback + redirect
      - "8080:8080"   # HTTP admin API — Zencore internal only (block externally)

    volumes:
      - stalwart-data:/opt/stalwart
      - ./resources/config:/opt/stalwart/etc:ro

    healthcheck:
      test: ["CMD-SHELL", "ss -tnlp | grep -q ':8080'"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  stalwart-data:
    name: stalwart-data
